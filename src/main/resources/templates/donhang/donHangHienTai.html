<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Đơn hàng của bạn</title>
</head>
<body>
<h2>Danh sách đơn hàng</h2>
<table border="1">
  <tr>
    <th>Mã Đơn</th>
    <th>Ngày Đặt</th>
    <th>Tổng Tiền</th>
    <th>Địa Chỉ</th>
    <th>SĐT</th>
    <th>Phương Thức Thanh Toán</th>
    <th>Trạng Thái</th>
  </tr>
  <tr th:each="dh : ${donHangs}">
    <td th:text="${dh.maDonHang}"></td>
    <td th:text="${dh.ngayDat}"></td>
    <td th:text="${dh.tongTien}"></td>
    <td th:text="${dh.diaChiNhanHang}"></td>
    <td th:text="${dh.soDienThoai}"></td>
    <td th:text="${dh.phuongThucThanhToan}"></td>
    <td th:text="${dh.trangThai}"></td>
  </tr>
</table>
</body>
</html>
