<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .thumb {
      cursor: pointer;
      margin: 5px;
      border: 2px solid transparent;
    }

    .thumb.active {
      border-color: #f76c1c;
    }

    .thumb img {
      width: 70px;
      height: 70px;
      object-fit: cover;
    }

    #mainImage {
      max-height: 400px;
      object-fit: contain;
    }

    .variant-btn {
      margin: 5px;
    }

    .variant-btn.active {
      border-color: #f76c1c;
      background-color: #fef0e6;
    }
  </style>
</head>
<body class="p-5">

<div class="container">
  <div class="row">
    <div class="col-md-6 text-center">
      <!-- Ảnh chính lấy từ ảnh đầu tiên trong danh sách -->
      <img id="mainImage" th:src="${imageList[0]}" class="img-fluid border mb-3" alt="Ảnh chính">

      <!-- Danh sách ảnh thumbnail -->
      <div class="d-flex justify-content-center flex-wrap">
        <div class="thumb"
             th:each="img, iterStat : ${imageList}"
             th:classappend="${iterStat.index == 0} ? ' active' : ''"
             th:attr="onclick=|changeImage('${img}', this)|">
          <img th:src="${img}" alt="thumb">
        </div>
      </div>
    </div>


    <!-- Cột thuộc tính biến thể -->
    <div class="col-md-6">
      <h2>Chọn biến thể</h2>
      <div th:each="tt : ${thuocTinhs}">
        <button type="button"
                class="btn btn-outline-secondary variant-btn"
                th:text="${tt.tenThuocTinh}"
                th:data-sku="${tt.bienThe.maSKU}"
                th:data-gia="${tt.bienThe.gia}"
                onclick="selectVariant(this)">
        </button>
      </div>



      <div class="mt-4">
        <strong>Đơn giá:</strong> <span id="skuText">Chưa chọn</span>

      </div>
    </div>
  </div>
  <form th:action="@{/muahang/tam}" method="post" onsubmit="return validateOrder()">
    <!-- Hidden SKU được JS gán khi chọn biến thể -->
    <input type="hidden" name="maSKU" id="skuInput" />

    <div class="mb-3">
      <label>Số lượng:</label>
      <input type="number" name="soLuong" class="form-control" min="1" value="1" required>
    </div>

    <button type="submit" class="btn btn-success">Đặt hàng</button>
  </form>


  <a th:href="@{/sanpham}" class="btn btn-secondary mt-5">Quay lại sản phẩm</a>
</div>

<script>
  function changeImage(src, el) {
    document.getElementById("mainImage").src = src;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function selectVariant(button) {
    // Xóa trạng thái active cũ và set active mới
    document.querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active'));
    button.classList.add('active');

    // Lấy giá trị SKU và giá
    const sku = button.getAttribute("data-sku");
    const gia = button.getAttribute("data-gia");

    // Gán vào hidden input
    document.getElementById("skuInput").value = sku;

    // Hiển thị giá lên giao diện
    const formattedGia = new Intl.NumberFormat('vi-VN').format(gia);
    document.getElementById("skuText").textContent = formattedGia + " đ";
  }


  function validateOrder() {
    const sku = document.getElementById("skuInput").value;
    if (!sku) {
      alert("Vui lòng chọn biến thể sản phẩm!");
      return false;
    }
    return true;
  }
</script>


</body>
</html>
