<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .thumb {
      cursor: pointer;
      margin: 5px;
      border: 2px solid transparent;
    }

    .thumb.active {
      border-color: #f76c1c;
    }

    .thumb img {
      width: 70px;
      height: 70px;
      object-fit: cover;
    }

    #mainImage {
      max-height: 400px;
      object-fit: contain;
    }

    .variant-btn {
      margin: 5px;
    }

    .variant-btn.active {
      border-color: #f76c1c;
      background-color: #fef0e6;
    }
  </style>
</head>
<body class="p-5">

<div class="container">
  <div class="row">
    <!-- Cột ảnh sản phẩm -->
    <div class="col-md-6 text-center">
      <img id="mainImage" th:src="${imageList[0]}" class="img-fluid border mb-3" alt="Ảnh chính">
      <div class="d-flex justify-content-center flex-wrap">
        <div class="thumb"
             th:each="img, iterStat : ${imageList}"
             th:classappend="${iterStat.index == 0} ? ' active' : ''"
             th:attr="onclick=|changeImage('${img}', this)|">
          <img th:src="${img}" alt="thumb">
        </div>
      </div>
    </div>

    <!-- Cột chọn biến thể -->
    <div class="col-md-6">
      <h2>Chọn biến thể</h2>

      <div th:each="entry : ${groupedThuocTinh}">
        <div><strong th:text="${entry.key}"></strong></div>
        <div>
          <button type="button"
                  class="btn btn-outline-secondary variant-btn me-1 mb-1"
                  th:each="tenBienThe : ${entry.value}"
                  th:text="${tenBienThe}">
          </button>
        </div>
      </div>

      <div class="mt-3">
        <strong>Giá gốc:</strong>
        <span id="gia-san-pham" th:text="${sanPham.getGiaHienThi()} + ' VNĐ'"></span>
      </div>

      <div class="mt-2">
        <strong>Đã chọn:</strong>
        <span id="thuoc-tinh-da-chon">Chưa chọn</span>
      </div>
    </div>
  </div>

  <a th:href="@{/sanpham}" class="btn btn-secondary mt-5">Quay lại sản phẩm</a>
</div>

<script>
  // Đổi ảnh chính khi chọn thumbnail
  function changeImage(src, el) {
    document.getElementById("mainImage").src = src;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function validateOrder() {
    const sku = document.getElementById("skuInput")?.value;
    if (!sku) {
      alert("Vui lòng chọn biến thể sản phẩm!");
      return false;
    }
    return true;
  }

  // Biến thể được truyền từ server
  const bienTheList = /*[[${bienTheList}]]*/ [];

  document.addEventListener("DOMContentLoaded", () => {
    const selectedValues = {};

    document.querySelectorAll(".variant-btn").forEach(btn => {
      const groupName = btn.closest("div").previousElementSibling.innerText.trim();

      btn.addEventListener("click", function () {
        btn.parentElement.querySelectorAll(".variant-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");

        selectedValues[groupName] = this.innerText.trim();
        updatePrice();
      });
    });

    function updatePrice() {
      const matched = bienTheList.find(bt =>
              Object.entries(selectedValues).every(([k, v]) =>
                      bt.thuocTinhBienThes.some(ttbt =>
                              ttbt.thuocTinh.tenThuocTinh === k && ttbt.tenThuocTinhBienThe === v
                      )
              )
      );

      const giaEl = document.getElementById("gia-san-pham");
      if (matched) {
        giaEl.innerText = matched.gia.toLocaleString() + " VNĐ";
      } else {
        giaEl.innerText = "Không tìm thấy giá phù hợp";
      }

      // Hiển thị thuộc tính đã chọn
      const selectedText = Object.entries(selectedValues)
              .map(([k, v]) => `${k}: ${v}`)
              .join(", ");
      document.getElementById("thuoc-tinh-da-chon").innerText = selectedText || "Chưa chọn";
    }
  });
</script>

</body>
</html>
