<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Mua Hàng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f8f8;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .don-hang {
            background-color: #fff;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .order-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 15px;
        }

        .order-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .order-info {
            flex: 1;
        }

        .don-hang h3 {
            margin-top: 0;
            color: #007bff;
        }

        .don-hang p {
            margin: 4px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #f1f1f1;
        }

        .thuoc-tinh {
            color: #555;
            font-size: 14px;
            margin-left: 10px;
            display: block;
        }

        .tabs {
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs a {
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            border: 1px solid #ccc;
            background-color: #e0e0e0;
            color: #000;
            border-radius: 5px;
        }

        .tabs a.active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        .back-home {
            text-align: center;
            margin-top: 30px;
        }

        .back-home button {
            padding: 10px 20px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .back-home button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>Lịch sử mua hàng</h1>

<div class="tabs">
    <a th:href="@{/lichsumuahang}" th:classappend="${trangThai == null} ? 'active' : ''">Tất cả</a>
    <a th:href="@{/lichsumuahang(trangThai=0)}" th:classappend="${trangThai == 0} ? 'active' : ''">Chờ duyệt</a>
    <a th:href="@{/lichsumuahang(trangThai=1)}" th:classappend="${trangThai == 1} ? 'active' : ''">Đang giao hàng</a>
</div>

<div th:if="${#lists.isEmpty(danhSachDonHang)}">
    <p style="text-align: center;">Không có đơn hàng nào.</p>
</div>

<div th:each="donHang : ${danhSachDonHang}" class="don-hang">

    <div class="order-header">
        <img th:src="@{('/images/sanpham' + ${donHang.chiTietDonHangs[0].bienThe.maSKU} + '_1.png')}"
             alt="Ảnh sản phẩm"
             class="order-img"
             onerror="this.onerror=null; this.src='/images/default.png';" />

        <div class="order-info">
            <h3>
                Mã đơn: <span th:text="${donHang.maDonHang}"></span> |
                Ngày đặt: <span th:text="${donHang.ngayDat}"></span>
            </h3>
            <p>Địa chỉ nhận hàng: <span th:text="${donHang.diaChiNhanHang}"></span></p>
            <p>Số điện thoại: <span th:text="${donHang.soDienThoai}"></span></p>
            <p>Phương thức thanh toán: <span th:text="${donHang.phuongThucThanhToan}"></span></p>
            <p><strong>Tổng tiền:</strong> <span th:text="${donHang.giaHienThi}"></span></p>
            <p><strong>Trạng thái:</strong> <span th:text="${donHang.getTrangThaiHienThi}"></span></p>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>SKU</th>
            <th>Tên sản phẩm & Thuộc tính</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ct : ${donHang.chiTietDonHangs}">
            <td th:text="${ct.bienThe.maSKU}"></td>
            <td>
                <span th:text="${ct.bienThe.sanPham.tenSanPham}"></span>
                <div th:each="tt : ${ct.bienThe.thuocTinhs}">
                    <div th:each="ttbt : ${tt.thuocTinhBienTheList}" class="thuoc-tinh">
                        <span th:text="${tt.tenThuocTinh + ': ' + ttbt.tenThuocTinhBienThe}"></span>
                    </div>
                </div>
            </td>
            <td th:text="${ct.soLuong}"></td>
            <td th:text="${#numbers.formatDecimal(ct.donGia, 0, 'POINT', 0, 'NONE')} + ' đ'"></td>
        </tr>
        </tbody>
    </table>
</div>

<div class="back-home">
    <a th:href="@{/sanpham}">
        <button>Về trang chủ</button>
    </a>
</div>

</body>
</html>
