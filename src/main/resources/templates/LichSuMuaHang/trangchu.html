<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Mua Hàng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f8f8;
            font-size: 13px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .don-hang {
            background-color: #fff;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            border-radius: 6px;
        }

        .order-header {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .order-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .order-info {
            flex: 1;
        }

        .order-info h3 {
            margin: 0 0 5px;
            color: #007bff;
            font-size: 14px;
        }

        .order-info p {
            margin: 2px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 6px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f1f1f1;
        }

        .thuoc-tinh {
            color: #555;
            font-size: 12px;
        }

        .tabs {
            text-align: center;
            margin-bottom: 15px;
        }

        .tabs a {
            text-decoration: none;
            padding: 6px 12px;
            margin: 0 4px;
            border: 1px solid #ccc;
            background-color: #e0e0e0;
            color: #000;
            border-radius: 4px;
            font-size: 13px;
        }

        .tabs a.active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home button {
            padding: 8px 16px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .back-home button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>Lịch sử mua hàng</h1>

<div class="tabs">
    <a th:href="@{/lichsumuahang}" th:classappend="${trangThai == null} ? 'active' : ''">Tất cả</a>
    <a th:href="@{/lichsumuahang(trangThai=0)}" th:classappend="${trangThai == 0} ? 'active' : ''">Chờ duyệt</a>
    <a th:href="@{/lichsumuahang(trangThai=1)}" th:classappend="${trangThai == 1} ? 'active' : ''">Chờ lấy hàng</a>
    <a th:href="@{/sanpham}">🔙 Quay lại</a>
</div>

<div th:if="${#lists.isEmpty(danhSachDonHang)}">
    <p style="text-align: center;">Không có đơn hàng nào.</p>
</div>

<div th:each="donHang : ${danhSachDonHang}" class="don-hang">
    <div class="order-header">
        <img th:src="@{('/images/sanpham' + ${donHang.chiTietDonHangs[0].bienThe.maSKU} + '-1.png')}"
             alt="Ảnh sản phẩm"
             class="order-img"
             onerror="this.onerror=null; this.src='/images/default.png';" />

        <div class="order-info">
            <h3>
                Mã: <span th:text="${donHang.maDonHang}"></span> |
                Ngày: <span th:text="${donHang.ngayDat}"></span>
            </h3>
            <p>Địa chỉ: <span th:text="${donHang.diaChiNhanHang}"></span></p>
            <p>SĐT: <span th:text="${donHang.soDienThoai}"></span></p>
            <p>Thanh toán: <span th:text="${donHang.phuongThucThanhToan}"></span></p>
            <p><strong>Tổng:</strong> <span th:text="${donHang.giaHienThi}"></span></p>
            <p><strong>Trạng thái:</strong> <span th:text="${donHang.getTrangThaiHienThi}"></span></p>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>SKU</th>
            <th>Sản phẩm</th>
            <th>SL</th>
            <th>Giá</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ct : ${donHang.chiTietDonHangs}">
            <td th:text="${ct.bienThe.maSKU}"></td>
            <td>
                <span th:text="${ct.bienThe.sanPham.tenSanPham}"></span>
                <div th:each="tt : ${ct.bienThe.thuocTinhs}" class="thuoc-tinh">
                    <span th:text="${tt.tenThuocTinh + ': ' + tt.tenThuocTinhBienThe}"></span>
                </div>
            </td>
            <td th:text="${ct.soLuong}"></td>
            <td th:text="${#numbers.formatDecimal(ct.donGia, 0, 'POINT', 0, 'NONE')} + ' đ'"></td>
        </tr>
        </tbody>
    </table>
</div>

<div class="back-home">
    <a th:href="@{/sanpham}">
        <button>Về trang chủ</button>
    </a>
</div>

</body>
</html>
