<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Đơn hàng của Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .order-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      padding: 20px;
      margin-bottom: 20px;
    }

    .order-header {
      font-weight: bold;
      color: #ee4d2d;
    }

    .order-item {
      border-top: 1px solid #eee;
      padding-top: 10px;
      margin-top: 10px;
    }

    .price {
      color: #ee4d2d;
      font-weight: bold;
    }

    .small-text {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body class="container py-4">

<h2 class="mb-4">📦 Đơn hàng của Shop</h2>

<div th:if="${#lists.isEmpty(donHangList)}">
  <p>Không có đơn hàng nào cần duyệt.</p>
</div>

<div th:each="don : ${donHangList}" class="order-card">
  <div class="order-header">
    🧾 Mã đơn: <span th:text="${don.maDonHang}"></span> |
    🗓 Ngày đặt: <span th:text="${don.ngayDat}"></span> |
    👤 Người mua: <span th:text="${don.user.username}"></span>
  </div>

  <div class="mt-2 small-text">
    📍 Địa chỉ: <span th:text="${don.diaChiNhanHang}"></span><br>
    📞 SĐT: <span th:text="${don.soDienThoai}"></span><br>
    💳 Thanh toán: <span th:text="${don.phuongThucThanhToan}"></span>
  </div>

  <!-- Chi tiết từng sản phẩm trong đơn -->
  <div class="order-body mt-3">
    <div th:each="ct : ${don.chiTietDonHangs}"
         th:if="${ct.bienThe.sanPham.user.id == session.currentUser.id}"
         class="order-item d-flex justify-content-between align-items-center">

      <div>
        <div><strong th:text="${ct.bienThe.sanPham.tenSanPham}">Tên sản phẩm</strong></div>
        <div class="small-text">Mã SKU: <span th:text="${ct.bienThe.maSKU}"></span></div>
        <div class="small-text">Số lượng: <span th:text="${ct.soLuong}"></span></div>
        <div th:each="tt : ${ct.bienThe.thuocTinhs}" class="small-text">
          ➤ <span th:text="${tt.tenThuocTinh + ': ' + tt.tenThuocTinhBienThe}"></span>
        </div>
      </div>

      <div class="price" th:text="'Đơn giá: ' + ${ct.getDonGiaHienThi()}">Đơn giá: 100.000 đ</div>

    </div>
  </div>

  <!-- Tổng tiền và trạng thái -->
  <div class="mt-3">
    🧮 Tổng tiền: <strong th:text="${don.getGiaHienThi()}"></strong><br>
    🚚 Trạng thái: <strong th:text="${don.getTrangThaiHienThi()}"></strong>
  </div>

  <!-- Hành động duyệt đơn -->
  <div class="mt-3 d-flex gap-2">
    <a th:href="@{'/shop/duyet/' + ${don.maDonHang}}" class="btn btn-success btn-sm">✅ Duyệt đơn</a>
    <a th:href="@{'/shop/huy/' + ${don.maDonHang}}" class="btn btn-outline-danger btn-sm">❌ Hủy</a>
  </div>
</div>

</body>
</html>
