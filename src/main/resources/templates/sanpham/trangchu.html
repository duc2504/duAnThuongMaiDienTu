<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách Sản phẩm</title>
  <style>
    .product-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .product-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 220px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .product-card:hover {
      transform: scale(1.02);
    }

    .product-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .product-desc {
      font-size: 14px;
      color: #555;
    }

    .product-actions {
      margin-top: 10px;
    }

    .product-actions a {
      margin-right: 10px;
      text-decoration: none;
      color: #007BFF;
    }

    .pagination {
      margin-top: 20px;
    }

    .pagination a.active {
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>
<h1>Danh sách Sản phẩm</h1>

<!-- Form tìm kiếm -->
<form th:action="@{/sanpham}" method="get">
  <input type="text" name="tenSanPham" th:value="${searchName}" placeholder="Tìm theo tên">
  <button type="submit">Tìm kiếm</button>
  <a th:if="${searchMode}" th:href="@{/sanpham}">Reset</a>
</form>

<a th:href="@{/sanpham/add}">Thêm sản phẩm mới</a>

<!-- Grid sản phẩm -->
<div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px;">
  <div class="product-card-wrapper" th:each="sp : ${sanpham}">
    <a th:href="@{'/thuoctinh/' + ${sp.maSanPham}}" style="text-decoration: none; color: inherit;">
      <div class="product-card" style="border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s ease; background-color: #fff;">
        <div class="product-title" th:text="${sp.tenSanPham}" style="font-size: 18px; font-weight: bold; margin-bottom: 8px;"></div>

        <div class="product-desc" th:text="${sp.moTa}" style="font-size: 14px; color: #555; margin-bottom: 8px;"></div>

        <div class="product-price" th:text="${sp.giaHienThi}" style="font-size: 16px; color: #c0392b; font-weight: 500; margin-bottom: 8px;"></div>

        <div class="product-category" style="font-size: 14px; color: #333; margin-bottom: 8px;">
          <strong>Danh mục:</strong>
          <span th:text="${sp.danhMuc != null ? sp.danhMuc.tenDanhMuc : 'Không có'}"></span>
        </div>

        <div class="product-actions" style="font-size: 13px; color: #888;">
          Nhấn để xem chi tiết →
        </div>
      </div>
    </a>
  </div>
</div>

<!-- Phân trang -->
<div class="pagination">
  <span>Trang: </span>
  <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
    <a th:href="@{/sanpham(page=${i}, tenSanPham=${searchName})}"
       th:text="${i + 1}"
       th:classappend="${i == currentPage} ? 'active' : ''">1</a>
    <span th:if="${i < totalPages - 1}">|</span>
  </span>
</div>


<a th:href="@{/lichsumuahang}">
  <button>Đơn hàng</button>
</a>

<a th:href="@{/lichsumuahang/admin}">
  <button>Cập nhật đơn hàng</button>
</a>

</body>
</html>
